# Build and deploy Django app to Azure App Service (PaaS).
#
# Setup:
# 1. Create a Web App in Azure (Python runtime).
# 2. Download publish profile → GitHub secret AZURE_WEBAPP_PYTHON_PUBLISH_PROFILE.
# 3. Set AZURE_WEBAPP_NAME below to your web app name.
#
# https://learn.microsoft.com/azure/app-service/deploy-github-actions

name: Build and deploy Python app to Azure Web App

env:
  AZURE_WEBAPP_NAME: your-python-webapp-name  # change for your App Service
  PYTHON_VERSION: "3.11"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Python/source
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            ./Python/source
            !./Python/source/.venv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: ./deploy

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PYTHON_PUBLISH_PROFILE }}
          package: ./deploy
